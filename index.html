<!DOCTYPE html>
<!--
  鉄構部アプリ_ランチャー
  更新履歴:
  V1.01 (2026/07/15) 初回作成：カード一覧・検索・QR表示
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄構部アプリ_ランチャー v1.01</title>
<style>
  :root{
    --bg:#F5F7F9;
    --card-bg:#FFFFFF;
    --text:#333B42;
    --sub:#6B7580;
    --accent:#2C5F8A;
    --accent-light:#E7F0F7;
    --border:#E1E6EA;
    --tag-bg:#EEF3F7;
    --tag-text:#3A5A76;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Yu Gothic","Hiragino Sans",sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    padding:20px 24px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  h1{
    font-size:22px;
    margin:0;
  }
  .version{
    font-size:12px;
    color:var(--sub);
  }
  #searchBox{
    margin-top:14px;
    width:100%;
    max-width:480px;
    padding:10px 14px;
    font-size:15px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--text);
  }
  #searchBox:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  main{
    padding:8px 24px 40px;
  }
  #cardGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
  }
  .card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
    cursor:pointer;
    transition:box-shadow .15s ease, transform .15s ease;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card:hover{
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    transform:translateY(-2px);
  }
  .card-name{
    font-size:17px;
    font-weight:700;
    margin:0;
  }
  .card-desc{
    font-size:13.5px;
    color:var(--sub);
    margin:0;
    line-height:1.5;
  }
  .tag-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag{
    background:var(--tag-bg);
    color:var(--tag-text);
    font-size:11.5px;
    padding:3px 9px;
    border-radius:999px;
  }
  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:auto;
    padding-top:6px;
  }
  .updated{
    font-size:11.5px;
    color:var(--sub);
  }
  .qr-btn{
    border:1px solid var(--border);
    background:#fff;
    color:var(--accent);
    font-size:12px;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .qr-btn:hover{
    background:var(--accent-light);
  }
  #emptyMsg{
    color:var(--sub);
    padding:30px 0;
    text-align:center;
    display:none;
  }
  /* QRモーダル */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{
    display:flex;
  }
  .modal-box{
    background:#fff;
    border-radius:14px;
    padding:24px;
    text-align:center;
    max-width:90vw;
  }
  .modal-box h3{
    margin:0 0 14px;
    font-size:15px;
  }
  #qrCanvasWrap{
    display:flex;
    justify-content:center;
  }
  .modal-close{
    margin-top:16px;
    padding:8px 20px;
    border:none;
    background:var(--accent);
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>鉄構部アプリ_ランチャー</h1>
    <span class="version">v1.01</span>
  </div>
  <input type="text" id="searchBox" placeholder="アプリ名・説明・タグで検索">
</header>

<main>
  <div id="cardGrid"></div>
  <div id="emptyMsg">該当するアプリがありません</div>
</main>

<div class="modal-overlay" id="qrOverlay">
  <div class="modal-box">
    <h3 id="qrTitle"></h3>
    <div id="qrCanvasWrap"></div>
    <button class="modal-close" id="qrCloseBtn">閉じる</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ==========================
   データ読込
========================== */
let allApps = [];

async function loadApps(){
  try{
    const res = await fetch('apps.json');
    const data = await res.json();
    allApps = (data.apps || []).sort((a,b)=>a.order-b.order);
    renderCards(allApps);
  }catch(e){
    document.getElementById('cardGrid').innerHTML =
      '<p style="color:#c0392b;">apps.jsonの読み込みに失敗しました</p>';
  }
}

/* ==========================
   カード描画
========================== */
function renderCards(apps){
  const grid = document.getElementById('cardGrid');
  const emptyMsg = document.getElementById('emptyMsg');
  grid.innerHTML = '';

  if(apps.length === 0){
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  apps.forEach(app=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;

    const tagsHtml = (app.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');

    card.innerHTML = `
      <p class="card-name">${escapeHtml(app.name)}</p>
      <p class="card-desc">${escapeHtml(app.description||'')}</p>
      <div class="tag-row">${tagsHtml}</div>
      <div class="card-footer">
        <span class="updated">更新: ${escapeHtml(app.updated||'')}</span>
        <button class="qr-btn" data-url="${escapeHtml(app.url)}" data-name="${escapeHtml(app.name)}">QR</button>
      </div>
    `;

    card.addEventListener('click', (e)=>{
      if(e.target.classList.contains('qr-btn')) return;
      window.open(app.url, '_blank');
    });
    card.addEventListener('keypress', (e)=>{
      if(e.key === 'Enter') window.open(app.url, '_blank');
    });

    grid.appendChild(card);
  });

  grid.querySelectorAll('.qr-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      showQrModal(btn.dataset.url, btn.dataset.name);
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

/* ==========================
   検索
========================== */
document.getElementById('searchBox').addEventListener('input', (e)=>{
  const keyword = e.target.value.trim().toLowerCase();
  if(!keyword){
    renderCards(allApps);
    return;
  }
  const filtered = allApps.filter(app=>{
    const inName = app.name.toLowerCase().includes(keyword);
    const inDesc = (app.description||'').toLowerCase().includes(keyword);
    const inTags = (app.tags||[]).some(t=>t.toLowerCase().includes(keyword));
    return inName || inDesc || inTags;
  });
  renderCards(filtered);
});

/* ==========================
   QRモーダル
========================== */
function showQrModal(url, name){
  const overlay = document.getElementById('qrOverlay');
  const wrap = document.getElementById('qrCanvasWrap');
  document.getElementById('qrTitle').textContent = name;
  wrap.innerHTML = '';
  new QRCode(wrap, { text: url, width:220, height:220 });
  overlay.classList.add('show');
}
document.getElementById('qrCloseBtn').addEventListener('click', ()=>{
  document.getElementById('qrOverlay').classList.remove('show');
});
document.getElementById('qrOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'qrOverlay') e.currentTarget.classList.remove('show');
});

loadApps();
</script>
</body>
</html>
