<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄構部アプリ_ランチャー v6</title>
<style>
/* ==================== 変数定義 ==================== */
:root{
  --bg-navy:#070b14;
  --bg-navy2:#0b1220;
  --grid-line:rgba(120,180,255,0.06);
  --cyan:#4be8e0;
  --cyan-glow:rgba(75,232,224,0.45);
  --text-main:#e7edf5;
  --text-sub:#7f8ca3;
  --glass-bg:rgba(20,28,45,0.55);
  --glass-border:rgba(120,180,255,0.14);
  --card-bg:rgba(15,22,38,0.72);
  --card-border:rgba(120,180,255,0.45);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 0%, rgba(75,232,224,0.05), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(120,90,255,0.05), transparent 40%),
    var(--bg-navy);
  background-attachment:fixed;
  font-family:"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--text-main);
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:38px 38px;
  pointer-events:none;
  z-index:0;
}

.wrap{
  position:relative;
  z-index:1;
  max-width:1400px;
  margin:0 auto;
  padding:28px 32px 80px;
}

/* ==================== ヘッダー ==================== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
  border-radius:16px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.header-left{display:flex;align-items:center;gap:14px;}

.logo-mark{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,#1a2333,#0c121e);
  border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);font-size:20px;
  box-shadow:0 0 14px rgba(75,232,224,0.15) inset;
}

.header-title-jp{font-size:20px;font-weight:700;letter-spacing:1px;}
.header-sub{font-size:11px;letter-spacing:2px;color:var(--text-sub);margin-top:2px;}

.header-right{text-align:right;font-family:"Consolas",monospace;}
.status-line{
  color:var(--cyan);
  font-size:12px;letter-spacing:2px;
  display:flex;align-items:center;justify-content:flex-end;gap:6px;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan-glow);
  animation:blink 1.6s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.clock{font-size:22px;font-weight:600;margin-top:2px;}
.date-line{font-size:12px;color:var(--text-sub);}

/* ==================== メインタイトル ==================== */
.hero{margin:48px 0 34px;}
.hero-label{
  font-size:12px;letter-spacing:4px;color:var(--text-sub);
  font-family:"Consolas",monospace;margin-bottom:10px;
}
.hero-title{
  font-size:44px;font-weight:800;letter-spacing:1px;
  color:var(--text-main);
}
.hero-title .accent{
  color:var(--cyan);
  text-shadow:0 0 20px var(--cyan-glow);
}
.hero-desc{margin-top:10px;color:var(--text-sub);font-size:14px;line-height:1.8;}

/* ==================== 検索・フィルタ ==================== */
.controls{
  display:flex;flex-wrap:wrap;gap:14px;margin-bottom:30px;align-items:center;
}

.search-box{
  flex:1 1 320px;
  display:flex;align-items:center;gap:10px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:12px;
  padding:12px 18px;
  backdrop-filter:blur(10px);
}
.search-box input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text-main);font-size:14px;
}
.search-box input::placeholder{color:var(--text-sub);}
.search-icon{color:var(--text-sub);font-size:15px;}

.filter-group{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  padding:10px 18px;border-radius:20px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  color:var(--text-sub);font-size:13px;cursor:pointer;
  transition:all .2s ease;white-space:nowrap;
}
.chip:hover{border-color:var(--cyan);color:var(--text-main);}
.chip.active{
  background:var(--cyan);color:#05100f;font-weight:700;
  border-color:var(--cyan);
  box-shadow:0 0 16px var(--cyan-glow);
}

.sort-label{font-size:11px;color:var(--text-sub);letter-spacing:2px;margin-right:2px;}

.add-btn{
  background:rgba(75,232,224,0.1);
  color:var(--cyan);border-color:var(--cyan);
  font-weight:700;
}
.add-btn:hover{
  background:var(--cyan);color:#05100f;
  box-shadow:0 0 16px var(--cyan-glow);
}

/* ==================== カードグリッド ==================== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:22px;
}

.card{
  position:relative;
  background:var(--card-bg);
  border:1.5px solid var(--card-border);
  border-radius:16px;
  padding:24px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 18px rgba(0,0,0,0.35);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--cyan);
  box-shadow:0 10px 30px rgba(0,0,0,0.45), 0 0 22px rgba(75,232,224,0.28);
}
.card:active{transform:scale(0.97);}

.card-top{
  display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;
}
.card-icon{
  width:46px;height:46px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;background:rgba(75,232,224,0.08);
  border:1px solid var(--glass-border);color:var(--cyan);
}
.card-meta{text-align:right;}
.tag-type{
  display:inline-block;font-size:10px;letter-spacing:1px;
  padding:4px 10px;border-radius:6px;
  background:rgba(75,232,224,0.12);color:var(--cyan);
  font-weight:700;margin-bottom:6px;
}
.tag-appno{font-size:10px;color:var(--text-sub);font-family:"Consolas",monospace;}
.tag-live{color:#5ee89a;font-weight:700;}

.card-name{font-size:18px;font-weight:700;margin-bottom:10px;}
.card-desc{font-size:13px;color:var(--text-sub);line-height:1.75;margin-bottom:18px;min-height:64px;}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.tag-pill{
  font-size:11px;padding:5px 12px;border-radius:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--glass-border);color:var(--text-sub);
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  font-size:11px;color:var(--text-sub);
  border-top:1px solid var(--glass-border);padding-top:12px;
}
.card-footer-left{display:flex;flex-direction:column;gap:2px;}

.card-icon-btn{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--glass-border);color:var(--text-sub);
  font-size:13px;cursor:pointer;transition:all .2s ease;
}
.card-icon-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.card-icon-btn.danger:hover{border-color:#ff6b6b;color:#ff6b6b;}
.card-actions{display:flex;gap:6px;}

.empty-msg{
  grid-column:1/-1;text-align:center;color:var(--text-sub);
  padding:60px 0;font-size:14px;
}

/* ==================== モーダル ==================== */
.modal-overlay{
  display:none;
  position:fixed;inset:0;z-index:50;
  background:rgba(3,6,12,0.7);
  backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex;}

.modal-box{
  width:100%;max-width:460px;
  background:var(--bg-navy2);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:28px;
  box-shadow:0 0 40px rgba(75,232,224,0.12);
  max-height:88vh;overflow-y:auto;
}
.modal-title{
  font-size:17px;font-weight:700;margin-bottom:18px;color:var(--cyan);
}
.modal-box label{
  display:block;font-size:12px;color:var(--text-sub);margin:14px 0 6px;
}
.modal-box input,.modal-box textarea,.modal-box select{
  width:100%;padding:10px 12px;border-radius:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--glass-border);
  color:var(--text-main);font-size:13px;outline:none;
  font-family:inherit;
}
.modal-box input:focus,.modal-box textarea:focus,.modal-box select:focus{
  border-color:var(--cyan);
}
.modal-box textarea{resize:vertical;min-height:64px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{
  display:flex;justify-content:flex-end;gap:10px;margin-top:22px;
}

/* QRモーダル */
.qr-modal-box{
  width:100%;max-width:320px;
  background:var(--bg-navy2);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:28px;text-align:center;
  box-shadow:0 0 40px rgba(75,232,224,0.12);
}
.qr-modal-box .modal-title{margin-bottom:16px;}
#qrCodeArea{
  display:flex;justify-content:center;align-items:center;
  background:#fff;border-radius:10px;padding:14px;margin-bottom:16px;
}
.qr-url-text{font-size:11px;color:var(--text-sub);word-break:break-all;margin-bottom:16px;}

/* ==================== レスポンシブ ==================== */
@media (max-width:820px){
  .wrap{padding:20px 16px 60px;}
  header{flex-direction:column;align-items:flex-start;gap:14px;}
  .header-right{text-align:left;}
  .status-line{justify-content:flex-start;}
  .hero-title{font-size:32px;}
  .grid{grid-template-columns:1fr;}
}
@media (max-width:480px){
  .hero-title{font-size:26px;}
  .filter-group{width:100%;}
  .chip{flex:1;text-align:center;}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-left">
      <div class="logo-mark">◎</div>
      <div>
        <div class="header-title-jp">App Console</div>
        <div class="header-sub">MASAMIZ / CONSTRUCTION TOOLS ・ ver.v6</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-line"><span class="status-dot"></span>SYSTEM ONLINE</div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-line" id="dateLine">----.--.--</div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-label">// APPLICATION LAUNCHER</div>
    <div class="hero-title">鉄構部アプリ<span class="accent">_ランチャー</span></div>
    <div class="hero-desc">積算・図面・検索まわりの自作ツールをここから起動。カードをクリックで各アプリへ移動します。</div>
  </div>

  <div class="controls">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="アプリ名・機能で検索 ...">
    </div>
    <div class="filter-group" id="categoryFilter">
      <div class="chip active" data-cat="ALL">ALL</div>
      <div class="chip" data-cat="WEB">WEB</div>
      <div class="chip" data-cat="LOCAL">LOCAL</div>
      <div class="chip" data-cat="MOBILE">MOBILE</div>
    </div>
    <div class="filter-group">
      <span class="sort-label">SORT</span>
      <div class="chip active" data-sort="new">新しい順</div>
      <div class="chip" data-sort="old">古い順</div>
    </div>
    <div class="chip add-btn" id="openAddModal">＋ アプリ登録</div>
  </div>

  <div class="grid" id="cardGrid"></div>

</div>

<!-- ==================== 登録／編集モーダル ==================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitleText">新規アプリ登録</div>

    <label>アプリ名</label>
    <input type="text" id="fName" placeholder="例：梁長計算ツール">

    <label>説明</label>
    <textarea id="fDesc" placeholder="アプリの説明を入力"></textarea>

    <label>起動URL / ファイルパス</label>
    <input type="text" id="fFile" placeholder="例：apps/tool.html または https://...">
    <div style="font-size:11px;color:var(--text-sub);margin-top:4px;">※サブフォルダ内のアプリは「apps/ファイル名.html」の形式で入力</div>
    <div class="form-row">
      <div>
        <label>カテゴリ</label>
        <select id="fCategory">
          <option value="WEB">WEB</option>
          <option value="LOCAL">LOCAL</option>
          <option value="MOBILE">MOBILE</option>
        </select>
      </div>
      <div>
        <label>アイコン（絵文字1文字）</label>
        <input type="text" id="fIcon" placeholder="⚙" maxlength="2">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>APP番号</label>
        <input type="text" id="fAppNo" placeholder="例：APP-08">
      </div>
      <div>
        <label>更新日</label>
        <input type="date" id="fDate">
      </div>
    </div>

    <label>作成者</label>
    <input type="text" id="fCreator" placeholder="例：山田">

    <label>タグ（カンマ区切り）</label>
    <input type="text" id="fTags" placeholder="例：計算, 自動転記">

    <div class="modal-actions">
      <div class="chip" id="cancelAdd">キャンセル</div>
      <div class="chip active" id="confirmAdd">登録する</div>
    </div>
  </div>
</div>

<!-- ==================== QRコードモーダル ==================== -->
<div class="modal-overlay" id="qrOverlay">
  <div class="qr-modal-box">
    <div class="modal-title">QRコード</div>
    <div id="qrCodeArea"></div>
    <div class="qr-url-text" id="qrUrlText"></div>
    <div class="chip active" id="closeQr">閉じる</div>
  </div>
</div>

/* ==================== アプリデータ（localStorage保存） ==================== */
const STORAGE_KEY = "tekkoubu_launcher_apps_v4";

function loadApps(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    return [];
  }
}
function saveApps(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

let APPS = loadApps();
let editingId = null;

/* ==================== 状態管理 ==================== */
let currentCategory = "ALL";
let currentSort = "new";
let searchKeyword = "";

/* ==================== 時計 ==================== */
function updateClock(){
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById("dateLine").textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ==================== フィルタ処理 ==================== */
function applyFilters(){
  let list = APPS.filter(app => {
    const matchCat = currentCategory === "ALL" || app.category === currentCategory;
    const kw = searchKeyword.trim().toLowerCase();
    const matchKw = !kw ||
      app.name.toLowerCase().includes(kw) ||
      app.desc.toLowerCase().includes(kw) ||
      app.tags.some(t => t.toLowerCase().includes(kw));
    return matchCat && matchKw;
  });

  list.sort((a,b) => {
    const da = new Date(a.date), db = new Date(b.date);
    return currentSort === "new" ? db - da : da - db;
  });

  renderCards(list);
}

/* ==================== カード描画 ==================== */
function isUrl(str){
  return /^https?:\/\//i.test(str);
}

function renderCards(list){
  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-msg">登録されたアプリがありません。「＋ アプリ登録」から追加してください。</div>`;
    return;
  }

  list.forEach(app => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <div class="card-icon">${app.icon}</div>
        <div class="card-meta">
          <div class="tag-type">${app.category} APP</div>
          <div class="tag-appno">${app.appNo} ・ <span class="tag-live">LIVE</span></div>
        </div>
      </div>
      <div class="card-name">${app.name}</div>
      <div class="card-desc">${app.desc}</div>
      <div class="tags">${app.tags.map(t=>`<span class="tag-pill">${t}</span>`).join("")}</div>
      <div class="card-footer">
        <div class="card-footer-left">
          <div>📅 ${app.date}</div>
          <div>👤 ${app.creator || "不明"}</div>
        </div>
        <div class="card-actions">
          ${isUrl(app.file) ? `<div class="card-icon-btn qr-btn" title="QRコード表示">▦</div>` : ""}
          <div class="card-icon-btn download-btn" title="ダウンロード">⭳</div>
          <div class="card-icon-btn edit-btn" title="編集">✎</div>
          <div class="card-icon-btn danger delete-btn" title="削除">✕</div>
        </div>
      </div>
    `;
    card.addEventListener("click", (e) => {
      if(e.target.closest(".card-icon-btn")) return;
      window.open(app.file, "_blank");
    });
    card.querySelector(".edit-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      openModal(app);
    });
    card.querySelector(".delete-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      if(!confirm(`「${app.name}」を削除しますか？`)) return;
      APPS = APPS.filter(a => a.id !== app.id);
      saveApps(APPS);
      applyFilters();
    });
    const qrBtn = card.querySelector(".qr-btn");
    if(qrBtn){
      qrBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openQrModal(app.file);
      });
    }
    card.querySelector(".download-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const a = document.createElement("a");
      a.href = app.file;
      a.download = app.file.split("/").pop();
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
    grid.appendChild(card);
  });
}

/* ==================== イベント登録（検索・絞込・並替） ==================== */
document.getElementById("searchInput").addEventListener("input", e => {
  searchKeyword = e.target.value;
  applyFilters();
});

document.getElementById("categoryFilter").addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  document.querySelectorAll("#categoryFilter .chip").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  currentCategory = chip.dataset.cat;
  applyFilters();
});

document.querySelectorAll('[data-sort]').forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll('[data-sort]').forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    currentSort = chip.dataset.sort;
    applyFilters();
  });
});

/* ==================== 登録／編集モーダル制御 ==================== */
const modalOverlay = document.getElementById("modalOverlay");

function openModal(app){
  editingId = app ? app.id : null;
  document.getElementById("modalTitleText").textContent = app ? "アプリ編集" : "新規アプリ登録";
  document.getElementById("fName").value = app ? app.name : "";
  document.getElementById("fDesc").value = app ? app.desc : "";
  document.getElementById("fFile").value = app ? app.file : "";
  document.getElementById("fCategory").value = app ? app.category : "WEB";
  document.getElementById("fIcon").value = app ? app.icon : "";
  document.getElementById("fAppNo").value = app ? app.appNo : "";
  document.getElementById("fDate").value = app ? app.date : new Date().toISOString().slice(0,10);
  document.getElementById("fCreator").value = app ? (app.creator || "") : "";
  document.getElementById("fTags").value = app ? app.tags.join(", ") : "";
  modalOverlay.classList.add("open");
}
function closeModal(){
  modalOverlay.classList.remove("open");
  editingId = null;
}

document.getElementById("openAddModal").addEventListener("click", () => openModal(null));
document.getElementById("cancelAdd").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", e => { if(e.target === modalOverlay) closeModal(); });

document.getElementById("confirmAdd").addEventListener("click", () => {
  const name = document.getElementById("fName").value.trim();
  const file = document.getElementById("fFile").value.trim();

  if(!name || !file){
    alert("アプリ名と起動URL/ファイルパスは必須です。");
    return;
  }

  const data = {
    name,
    desc: document.getElementById("fDesc").value.trim(),
    icon: document.getElementById("fIcon").value.trim() || "⚙",
    category: document.getElementById("fCategory").value,
    tags: document.getElementById("fTags").value.split(",").map(t=>t.trim()).filter(Boolean),
    appNo: document.getElementById("fAppNo").value.trim() || "APP-0",
    date: document.getElementById("fDate").value || new Date().toISOString().slice(0,10),
    creator: document.getElementById("fCreator").value.trim(),
    file
  };

  if(editingId){
    APPS = APPS.map(a => a.id === editingId ? {...a, ...data} : a);
  }else{
    data.id = "app_" + Date.now();
    APPS.push(data);
  }

  saveApps(APPS);
  closeModal();
  applyFilters();
});

/* ==================== QRコードモーダル制御 ==================== */
const qrOverlay = document.getElementById("qrOverlay");

function openQrModal(url){
  document.getElementById("qrCodeArea").innerHTML = "";
  document.getElementById("qrUrlText").textContent = url;
  new QRCode(document.getElementById("qrCodeArea"), {
    text: url,
    width: 200,
    height: 200
  });
  qrOverlay.classList.add("open");
}
document.getElementById("closeQr").addEventListener("click", () => qrOverlay.classList.remove("open"));
qrOverlay.addEventListener("click", e => { if(e.target === qrOverlay) qrOverlay.classList.remove("open"); });

/* ==================== 初期描画 ==================== */
applyFilters();
</script>
</body>
</html>
