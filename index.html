<style>
  :root{
    --bg:#0A0E14;
    --bg-grid:#111826;
    --panel:#111826;
    --panel-border:#233042;
    --text:#DCE6F0;
    --sub:#7C8CA0;
    --accent:#00D9FF;
    --accent-dim:#0A5A6B;
    --spark:#FF6A3D;
    --tag-bg:#152233;
    --tag-text:#5CD9F0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:"Noto Sans JP",sans-serif;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(0,217,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,255,0.05) 1px, transparent 1px);
    background-size:36px 36px;
    color:var(--text);
  }
  .fx{
    font-family:"Rajdhani",sans-serif;
    letter-spacing:0.03em;
  }
  header{
    padding:28px 28px 16px;
    border-bottom:1px solid var(--panel-border);
    background:linear-gradient(180deg, rgba(0,217,255,0.04), transparent);
  }
  .title-row{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    justify-content:space-between;
  }
  .title-left{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .header-icon{
    width:38px;
    height:38px;
    border-radius:9px;
    flex-shrink:0;
  }
  .app-qr-btn{
    font-family:"Rajdhani",sans-serif;
    font-size:12.5px;
    letter-spacing:0.03em;
    color:var(--accent);
    background:rgba(0,217,255,0.06);
    border:1px solid var(--accent-dim);
    padding:7px 16px;
    border-radius:6px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background .15s ease, color .15s ease;
  }
  .app-qr-btn:hover{
    background:var(--accent);
    color:#04141a;
  }
  h1{
    font-family:"Rajdhani",sans-serif;
    font-weight:700;
    font-size:26px;
    margin:0;
    letter-spacing:0.04em;
    color:#fff;
    text-shadow:0 0 14px rgba(0,217,255,0.35);
  }
  .version{
    font-family:"Rajdhani",sans-serif;
    font-size:13px;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    padding:2px 8px;
    border-radius:4px;
    background:rgba(0,217,255,0.06);
  }
  #searchBox{
    margin-top:18px;
    width:100%;
    max-width:480px;
    padding:11px 16px;
    font-size:14.5px;
    font-family:"Noto Sans JP",sans-serif;
    border:1px solid var(--panel-border);
    border-radius:6px;
    background:#0D131C;
    color:var(--text);
  }
  #searchBox::placeholder{color:var(--sub);}
  #searchBox:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(0,217,255,0.12);
  }
  #tagFilterRow{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .tag-filter-btn{
    font-family:"Rajdhani",sans-serif;
    font-size:12px;
    letter-spacing:0.03em;
    color:var(--tag-text);
    background:var(--tag-bg);
    border:1px solid rgba(92,217,240,0.25);
    padding:5px 13px;
    border-radius:4px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tag-filter-btn:hover{
    border-color:var(--accent);
  }
  .tag-filter-btn.active{
    background:var(--accent);
    color:#04141a;
    border-color:var(--accent);
  }
  main{
    padding:24px 28px 50px;
  }
  #cardGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
    gap:20px;
  }
  .card{
    position:relative;
    background:var(--panel);
    border:2px solid var(--panel-border);
    border-radius:10px;
    padding:20px;
    cursor:pointer;
    transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    display:flex;
    flex-direction:column;
    gap:11px;
    overflow:hidden;
  }
  /* HUD風コーナーマーカー */
  .card::before, .card::after{
    content:'';
    position:absolute;
    width:14px;
    height:14px;
    border:2px solid var(--accent);
    opacity:0;
    transition:opacity .18s ease;
  }
  .card::before{ top:6px; left:6px; border-right:none; border-bottom:none; }
  .card::after{ bottom:6px; right:6px; border-left:none; border-top:none; }
  .card:hover{
    border-color:var(--accent-dim);
    box-shadow:0 0 24px rgba(0,217,255,0.15);
    transform:translateY(-2px);
  }
  .card:hover::before, .card:hover::after{ opacity:1; }

  .card-name{
    font-family:"Rajdhani",sans-serif;
    font-weight:600;
    font-size:18px;
    margin:0;
    color:#fff;
    letter-spacing:0.02em;
  }
  .card-head{
    display:flex;
    align-items:center;
    gap:11px;
  }
  .card-icon{
    width:36px;
    height:36px;
    border-radius:8px;
    object-fit:cover;
    background:#0D131C;
    border:1px solid var(--panel-border);
    flex-shrink:0;
  }
  .card-note{
    display:flex;
    align-items:flex-start;
    gap:7px;
    background:rgba(255,106,61,0.12);
    border:1px solid var(--spark);
    color:#FFB199;
    font-size:12px;
    line-height:1.5;
    padding:8px 10px;
    border-radius:6px;
  }
  .card-note .note-icon{
    flex-shrink:0;
    font-size:13px;
    line-height:1.5;
  }
  .card-desc{
    font-size:13px;
    color:var(--sub);
    margin:0;
    line-height:1.55;
  }
  .tag-row{
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap:6px;
    min-height:52px;
  }
  .tag{
    background:var(--tag-bg);
    color:var(--tag-text);
    font-size:11px;
    font-family:"Rajdhani",sans-serif;
    letter-spacing:0.03em;
    padding:3px 10px;
    border-radius:3px;
    border:1px solid rgba(92,217,240,0.2);
  }
  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:auto;
    padding-top:8px;
    border-top:1px solid var(--panel-border);
  }
  .updated{
    font-size:11px;
    font-family:"Rajdhani",sans-serif;
    color:var(--sub);
    letter-spacing:0.02em;
  }
  .qr-btn{
    border:1px solid var(--accent-dim);
    background:transparent;
    color:var(--accent);
    font-family:"Rajdhani",sans-serif;
    font-size:11.5px;
    letter-spacing:0.05em;
    padding:5px 12px;
    border-radius:4px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .qr-btn:hover{
    background:var(--accent);
    color:#04141a;
  }
  #emptyMsg{
    color:var(--sub);
    padding:40px 0;
    text-align:center;
    display:none;
  }
  /* QRモーダル */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(4,8,14,0.75);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--accent-dim);
    box-shadow:0 0 40px rgba(0,217,255,0.2);
    border-radius:12px;
    padding:26px;
    text-align:center;
    max-width:90vw;
  }
  .modal-box h3{
    margin:0 0 16px;
    font-family:"Rajdhani",sans-serif;
    font-size:16px;
    color:#fff;
    letter-spacing:0.03em;
  }
  #qrCanvasWrap{
    display:flex;
    justify-content:center;
    background:#fff;
    padding:12px;
    border-radius:6px;
  }
  .modal-close{
    margin-top:18px;
    padding:8px 24px;
    border:1px solid var(--accent-dim);
    background:transparent;
    color:var(--accent);
    border-radius:6px;
    cursor:pointer;
    font-family:"Rajdhani",sans-serif;
    letter-spacing:0.04em;
    font-size:13px;
  }
  .modal-close:hover{
    background:var(--accent);
    color:#04141a;
  }
</style>
</head>

      <h1>鉄構部アプリ_ランチャー</h1>
      <span class="version fx">v1.10</span>
    </div>
    <button class="app-qr-btn" id="appQrBtn">📱 このランチャーのQRコード</button>
  </div>
  <input type="text" id="searchBox" placeholder="アプリ名・説明・タグで検索">
  <div id="tagFilterRow"></div>
</header>

<main>
  <div id="cardGrid"></div>
  <div id="emptyMsg">該当するアプリがありません</div>
</main>

<div class="modal-overlay" id="qrOverlay">
  <div class="modal-box">
    <h3 id="qrTitle"></h3>
    <div id="qrCanvasWrap"></div>
    <button class="modal-close" id="qrCloseBtn">閉じる</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ==========================
   データ読込
========================== */
let allApps = [];
let selectedTag = null;

async function loadApps(){
  try{
    const res = await fetch('apps.json');
    const data = await res.json();
    allApps = (data.apps || []).sort((a,b)=>a.order-b.order);
    renderTagFilter(allApps);
    renderCards(allApps);
  }catch(e){
    document.getElementById('cardGrid').innerHTML =
      '<p style="color:#FF6A3D;">apps.jsonの読み込みに失敗しました</p>';
  }
}

/* ==========================
   タグフィルタ描画
========================== */
function renderTagFilter(apps){
  const row = document.getElementById('tagFilterRow');
  const tagSet = new Set();
  apps.forEach(app=>(app.tags||[]).forEach(t=>tagSet.add(t)));

  row.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'tag-filter-btn' + (selectedTag === null ? ' active' : '');
  allBtn.textContent = '全て';
  allBtn.addEventListener('click', ()=>{
    selectedTag = null;
    renderTagFilter(allApps);
    applyFilters();
  });
  row.appendChild(allBtn);

  [...tagSet].forEach(tag=>{
    const btn = document.createElement('button');
    btn.className = 'tag-filter-btn' + (tag === selectedTag ? ' active' : '');
    btn.textContent = tag;
    btn.addEventListener('click', ()=>{
      selectedTag = (selectedTag === tag) ? null : tag;
      renderTagFilter(allApps);
      applyFilters();
    });
    row.appendChild(btn);
  });
}

/* ==========================
   カード描画
========================== */
function renderCards(apps){
  const grid = document.getElementById('cardGrid');
  const emptyMsg = document.getElementById('emptyMsg');
  grid.innerHTML = '';

  if(apps.length === 0){
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  apps.forEach(app=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;

    const tagsHtml = (app.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');
    const noteHtml = app.note
      ? `<div class="card-note"><span class="note-icon">⚠</span><span>${escapeHtml(app.note)}</span></div>`
      : '';
    const iconHtml = app.icon
      ? `<img class="card-icon" src="${escapeHtml(app.icon)}" alt="" onerror="this.style.display='none'">`
      : '';

    card.innerHTML = `
      <div class="card-head">
        ${iconHtml}
        <p class="card-name">${escapeHtml(app.name)}</p>
      </div>
      ${noteHtml}
      <p class="card-desc">${escapeHtml(app.description||'')}</p>
      <div class="tag-row">${tagsHtml}</div>
      <div class="card-footer">
        <span class="updated">更新: ${escapeHtml(app.updated||'')}</span>
        <button class="qr-btn" data-url="${escapeHtml(app.url)}" data-name="${escapeHtml(app.name)}">QRコード</button>
      </div>
    `;

    card.addEventListener('click', (e)=>{
      if(e.target.classList.contains('qr-btn')) return;
      window.open(app.url, '_blank');
    });
    card.addEventListener('keypress', (e)=>{
      if(e.key === 'Enter') window.open(app.url, '_blank');
    });

    grid.appendChild(card);
  });

  grid.querySelectorAll('.qr-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      showQrModal(btn.dataset.url, btn.dataset.name);
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

/* ==========================
   検索
========================== */
document.getElementById('searchBox').addEventListener('input', applyFilters);

function applyFilters(){
  const keyword = document.getElementById('searchBox').value.trim().toLowerCase();

  let filtered = allApps;

  if(selectedTag){
    filtered = filtered.filter(app=>(app.tags||[]).includes(selectedTag));
  }

  if(keyword){
    filtered = filtered.filter(app=>{
      const inName = app.name.toLowerCase().includes(keyword);
      const inDesc = (app.description||'').toLowerCase().includes(keyword);
      const inTags = (app.tags||[]).some(t=>t.toLowerCase().includes(keyword));
      return inName || inDesc || inTags;
    });
  }

  renderCards(filtered);
}

/* ==========================
   QRモーダル
========================== */
function showQrModal(url, name){
  const overlay = document.getElementById('qrOverlay');
  const wrap = document.getElementById('qrCanvasWrap');
  document.getElementById('qrTitle').textContent = name;
  wrap.innerHTML = '';
  new QRCode(wrap, { text: url, width:220, height:220 });
  overlay.classList.add('show');
}
document.getElementById('qrCloseBtn').addEventListener('click', ()=>{
  document.getElementById('qrOverlay').classList.remove('show');
});
document.getElementById('qrOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'qrOverlay') e.currentTarget.classList.remove('show');
});

/* ランチャー自体のQRコード表示 */
document.getElementById('appQrBtn').addEventListener('click', ()=>{
  showQrModal(window.location.href, '鉄構部アプリ_ランチャー');
});

loadApps();
</script>
</body>
</html>
